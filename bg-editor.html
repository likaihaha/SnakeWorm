<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DynamicBG 编辑器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f1115;
    color: #c9d1d9;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* 顶部工具栏 */
  .toolbar {
    height: 48px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
    z-index: 20;
  }
  .toolbar h1 {
    font-size: 15px;
    font-weight: 600;
    color: #58a6ff;
    margin-right: auto;
    letter-spacing: 1px;
  }
  .btn {
    padding: 6px 14px;
    border: 1px solid #30363d;
    background: #21262d;
    color: #c9d1d9;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn:hover { background: #30363d; border-color: #8b949e; }
  .btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .btn.primary:hover { background: #388bfd; }
  .btn.danger { background: #da3633; border-color: #da3633; color: #fff; }
  .btn.danger:hover { background: #f85149; }

  /* 主体 */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* 左侧场景元素列表 */
  .sidebar {
    width: 240px;
    background: #161b22;
    border-right: 1px solid #30363d;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .sidebar::-webkit-scrollbar { width: 6px; }
  .sidebar::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .field label {
    font-size: 12px;
    color: #8b949e;
    min-width: 70px;
  }
  .field input[type="range"] {
    flex: 1;
    accent-color: #58a6ff;
  }
  .field input[type="color"] {
    width: 36px;
    height: 24px;
    border: 1px solid #30363d;
    border-radius: 4px;
    background: none;
    cursor: pointer;
  }
  .field input[type="number"] {
    width: 60px;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 4px;
    padding: 3px 6px;
    font-size: 12px;
  }
  .field input[type="text"] {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 12px;
  }
  .field select {
    flex: 1;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 4px;
    padding: 4px 6px;
    font-size: 12px;
  }
  .val {
    font-size: 11px;
    color: #58a6ff;
    min-width: 36px;
    text-align: right;
    font-family: monospace;
  }

  /* 画布区域 */
  .canvas-wrap {
    flex: 1;
    position: relative;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    box-shadow: 0 0 30px rgba(0,0,0,0.8);
  }
  .canvas-info {
    position: absolute;
    bottom: 10px;
    left: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    pointer-events: none;
  }

  /* JSON 导出弹窗 */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 12px;
    width: 600px;
    max-width: 90vw;
    max-height: 80vh;
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    padding: 14px 18px;
    border-bottom: 1px solid #30363d;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .modal-body {
    padding: 14px 18px;
    flex: 1;
    overflow: auto;
  }
  .modal-body textarea {
    width: 100%;
    height: 300px;
    background: #0d1117;
    border: 1px solid #30363d;
    color: #c9d1d9;
    border-radius: 6px;
    padding: 10px;
    font-family: 'Consolas', monospace;
    font-size: 12px;
    resize: none;
  }
  .modal-footer {
    padding: 12px 18px;
    border-top: 1px solid #30363d;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  /* 浮动属性面板（可拖拽，无遮罩） */
  .prop-panel {
    position: fixed;
    top: 64px;
    right: 20px;
    width: 520px;
    max-width: 90vw;
    max-height: 85vh;
    background: rgba(22, 27, 34, 0.92);
    border: 1px solid #30363d;
    border-radius: 12px;
    display: none;
    flex-direction: column;
    z-index: 120;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
  }
  .prop-panel.active { display: flex; }
  .prop-panel .modal-header {
    cursor: grab;
    user-select: none;
    padding: 12px 16px;
    font-size: 13px;
  }
  .prop-panel .modal-header:active { cursor: grabbing; }
  .prop-panel .modal-body {
    padding: 12px 16px;
    max-height: 65vh;
    overflow-y: auto;
    flex: 1;
  }
  .prop-panel .modal-footer {
    padding: 10px 16px;
  }

  /* 场景元素列表 */
  .scene-list-header {
    font-size: 13px;
    font-weight: 600;
    color: #58a6ff;
    padding: 8px 12px 6px;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .scene-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    border: 1px solid transparent;
    user-select: none;
    position: relative;
  }
  .scene-item:hover {
    background: #161b22;
    border-color: #30363d;
  }
  .scene-item.selected {
    background: rgba(31, 111, 235, 0.15);
    border-color: #1f6feb;
  }
  .scene-item .item-icon {
    font-size: 16px;
    width: 22px;
    text-align: center;
    flex-shrink: 0;
  }
  .scene-item .item-name {
    flex: 1;
    font-size: 13px;
    color: #c9d1d9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .scene-item.hidden .item-name {
    color: #6e7681;
    text-decoration: line-through;
  }
  .scene-item .item-eye {
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    opacity: 0.5;
    transition: opacity 0.15s;
    flex-shrink: 0;
    border-radius: 4px;
  }
  .scene-item:hover .item-eye,
  .scene-item .item-eye:hover {
    opacity: 1;
    background: rgba(255,255,255,0.06);
  }
  .scene-group {
    margin-top: 6px;
  }
  .scene-group-title {
    font-size: 11px;
    color: #6e7681;
    padding: 6px 12px 2px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .scene-divider {
    height: 1px;
    background: #21262d;
    margin: 6px 12px;
  }

  /* 渐变色选择器 */
  .grad-mode-bar {
    display: flex;
    gap: 2px;
    margin-bottom: 6px;
  }
  .grad-mode-btn {
    padding: 3px 10px;
    font-size: 11px;
    border: 1px solid #30363d;
    background: #0d1117;
    color: #8b949e;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .grad-mode-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .grad-mode-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  .grad-preview-bar {
    height: 22px;
    border-radius: 4px;
    border: 1px solid #30363d;
    margin-bottom: 6px;
  }
  .grad-stop-row {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-bottom: 3px;
  }
  .grad-stop-row input[type="color"] {
    width: 26px; height: 20px; border: 1px solid #30363d; border-radius: 3px; background: none; cursor: pointer; padding: 0;
  }
  .grad-stop-row input[type="range"] { flex: 1; accent-color: #58a6ff; }
  .grad-stop-row .val { font-size: 10px; min-width: 28px; }
  .grad-stop-del {
    width: 18px; height: 18px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; cursor: pointer; color: #6e7681; border-radius: 3px; flex-shrink: 0;
  }
  .grad-stop-del:hover { color: #f85149; background: rgba(248,81,73,0.12); }
  .grad-add-btn {
    padding: 2px 8px; font-size: 10px; border: 1px solid #30363d; background: #0d1117;
    color: #8b949e; border-radius: 3px; cursor: pointer; margin-top: 2px;
  }
  .grad-add-btn:hover { border-color: #58a6ff; color: #c9d1d9; }

  /* 图层面板 */
  .layer-panel { margin-bottom: 4px; }
  .layer-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 12px 4px;
  }
  .layer-panel-title {
    font-size: 13px; font-weight: 600; color: #58a6ff; letter-spacing: 1px;
  }
  .layer-panel-actions { display: flex; gap: 4px; }
  .layer-panel-btn {
    padding: 2px 8px; font-size: 10px; border: 1px solid #30363d; background: #0d1117;
    color: #8b949e; border-radius: 3px; cursor: pointer;
  }
  .layer-panel-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
  .layer-panel-btn:disabled { opacity: 0.4; cursor: default; border-color: #30363d; color: #6e7681; }
  .layer-list { padding: 0 4px; }
  .layer-item {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 6px; border-radius: 4px; cursor: pointer;
    transition: background 0.12s; user-select: none;
    border: 1px solid transparent; margin-bottom: 1px;
  }
  .layer-item:hover { background: #21262d; }
  .layer-item.selected { background: #1f6feb22; border-color: #1f6feb44; }
  .layer-item.drag-over-top { border-top: 2px solid #58a6ff; }
  .layer-item.drag-over-bottom { border-bottom: 2px solid #58a6ff; }
  .layer-item.hidden-layer { opacity: 0.45; }
  .layer-item.in-group { padding-left: 20px; }
  .layer-drag {
    cursor: grab; color: #484f58; font-size: 11px; width: 14px; text-align: center;
    flex-shrink: 0; padding: 2px 0;
  }
  .layer-drag:active { cursor: grabbing; color: #8b949e; }
  .layer-icon { font-size: 13px; width: 18px; text-align: center; flex-shrink: 0; }
  .layer-name {
    flex: 1; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .layer-eye {
    font-size: 11px; cursor: pointer; color: #6e7681; flex-shrink: 0; padding: 2px;
    border-radius: 3px;
  }
  .layer-eye:hover { color: #c9d1d9; background: #30363d; }
  .layer-group-header {
    display: flex; align-items: center; gap: 4px;
    padding: 4px 6px; border-radius: 4px; cursor: pointer;
    transition: background 0.12s; margin-bottom: 1px;
    border: 1px solid #30363d;
  }
  .layer-group-header:hover { background: #21262d; }
  .layer-group-header.selected { background: #1f6feb22; border-color: #1f6feb44; }
  .layer-group-toggle {
    font-size: 9px; color: #8b949e; width: 14px; text-align: center;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .layer-group-toggle.collapsed { transform: rotate(-90deg); }
  .layer-group-icon { font-size: 13px; flex-shrink: 0; }
  .layer-group-name {
    flex: 1; font-size: 11px; font-weight: 500; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }
  .layer-group-count {
    font-size: 9px; color: #6e7681; background: #21262d;
    padding: 1px 5px; border-radius: 8px; flex-shrink: 0;
  }
  .layer-group-children { margin-left: 10px; }
  .layer-group-children.collapsed { display: none; }
  .layer-ctx-menu {
    position: fixed; background: #161b22; border: 1px solid #30363d;
    border-radius: 8px; padding: 4px 0; z-index: 300; min-width: 140px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); display: none;
  }
  .layer-ctx-item {
    padding: 5px 14px; font-size: 12px; cursor: pointer; color: #c9d1d9;
    display: flex; align-items: center; gap: 8px;
  }
  .layer-ctx-item:hover { background: #21262d; }
  .layer-ctx-item.danger { color: #f85149; }
  .layer-ctx-divider { height: 1px; background: #30363d; margin: 4px 0; }
</style>
</head>
<body>

<div class="toolbar">
  <h1>DynamicBG 编辑器 <span style="color:#8b949e;font-size:13px;font-weight:normal;">v2.2</span></h1>
  <button class="btn" onclick="loadConfig()">📂 载入 JSON</button>
  <button class="btn primary" onclick="saveConfig()">💾 保存 JSON</button>
  <button class="btn" onclick="exportCode()">📋 导出代码</button>
  <button class="btn danger" onclick="resetConfig()">↺ 重置</button>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="canvas-wrap">
    <canvas id="preview"></canvas>
    <div class="canvas-info" id="canvasInfo"></div>
  </div>
</div>

<!-- 隐藏文件输入 -->
<input type="file" id="fileInput" accept=".json" style="display:none" onchange="handleFile(event)">

<!-- 导出弹窗 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span id="modalTitle">导出</span>
      <span style="cursor:pointer;color:#8b949e;" onclick="closeModal()">✕</span>
    </div>
    <div class="modal-body">
      <textarea id="modalText" readonly></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="copyModal()">复制</button>
      <button class="btn primary" onclick="closeModal()">关闭</button>
    </div>
  </div>
</div>

<!-- 属性编辑浮动面板 -->
<div class="prop-panel" id="propEditor">
  <div class="modal-header" id="propEditorHeader">
    <span id="propEditorTitle">元素属性编辑</span>
    <span style="cursor:pointer;color:#8b949e;" onclick="closePropertyEditor()">✕</span>
  </div>
  <div class="modal-body" id="propEditorBody">
  </div>
  <div class="modal-footer">
    <button class="btn danger" onclick="closePropertyEditor()">关闭</button>
  </div>
</div>

<!-- 点击选择菜单 -->
<div id="hitMenu" style="display:none;position:fixed;background:#161b22;border:1px solid #30363d;border-radius:8px;padding:6px 0;z-index:200;min-width:160px;box-shadow:0 4px 20px rgba(0,0,0,0.5);"></div>

<script>
// ===================== 默认配置 =====================
const DEFAULT_CONFIG = {
  // 画布
  canvas: { width: 960, height: 540 },

  // 深海背景渐变
  background: {
    visible: true,
    centerX: 0.5, centerY: 0.3, radius: 0.8,
    color0: '#164a63', color1: '#0d2f42', color2: '#061924',
  },

  // 环境光晕
  ambient: {
    visible: true,
    centerX: 0.65, centerY: 0.35, radius: 0.5,
    color0: 'rgba(30, 107, 122, 0.35)', color1: 'rgba(13, 47, 66, 0)',
  },

  // 发光河流
  river: {
    visible: true,
    shadowColor: '#4de8d6', shadowBlur: 12,
    stroke0: 'rgba(45, 212, 191, 0.25)', width0: 35,
    stroke1: 'rgba(107, 255, 232, 0.4)', width1: 8,
    // 贝塞尔控制点 (相对坐标 0-1)
    path: [
      [-0.052,0.486],[0.078,0.472],[0.156,0.583],[0.273,0.556],
      [0.391,0.528],[0.469,0.625],[0.586,0.597],[0.703,0.569],
      [0.781,0.667],[0.898,0.639],[0.938,0.625],[0.977,0.653],[1.039,0.625]
    ]
  },

  // 左侧岩石
  leftRock: {
    visible: true,
    fill: '#0f222e',
    highlight: 'rgba(30, 58, 77, 0.5)',
    points: [[0,1],[0,0.667],[0.062,0.625],[0.117,0.681],[0.172,0.639],[0.219,0.722],[0.273,0.667],[0.328,0.736],[0.297,0.833],[0.25,0.903],[0.219,1]],
  },

  // 右侧前景岩石
  rightRock: {
    visible: true,
    fill: '#0a1c26',
    points: [[0.664,1],[0.703,0.833],[0.766,0.764],[0.82,0.806],[0.875,0.722],[0.938,0.778],[1,0.694],[1,1]],
  },

  // 烟囱
  vents: {
    visible: true,
    pipeGrad: ['#1a2b38','#2d3e4a','#1e303d','#0f1f2a'],
    topFill: '#0f1f2a',
    crackColor: 'rgba(255, 107, 44, 0.6)',
    crackGlow: '#ff6b2c',
    crackWidth: 2,
    crack2Color: 'rgba(255, 154, 60, 0.5)',
    // 两个烟囱: [x, y, wTop, wBot, h]
    pipes: [
      { x: 0.113, y: 0.521, wTop: 0.013, wBot: 0.013, h: 0.174 },
      { x: 0.193, y: 0.562, wTop: 0.011, wBot: 0.011, h: 0.153 },
    ],
    // 岩浆裂缝点
    cracks: [
      [0.062,0.764],[0.094,0.806],[0.117,0.778],[0.156,0.833],[0.195,0.806],[0.234,0.861]
    ],
    cracks2: [
      [0.141,0.722],[0.172,0.75],[0.203,0.736]
    ],
  },

  // 迷雾
  fog: {
    visible: true,
    color0: 'rgba(10, 31, 46, 0.85)',
    color1: 'rgba(13, 47, 66, 0.4)',
    color2: 'rgba(13, 47, 66, 0)',
  },

  // 暗角
  vignette: {
    visible: true,
    color0: 'rgba(2, 10, 16, 0.5)',
    color1: 'rgba(2, 10, 16, 0)',
  },

  // 水母
  jellyfish: {
    visible: true,
    x: 0.65, y: 0.22,
    radiusX: 70, radiusY: 55,
    bobSpeed: 0.4, bobAmp: 12,
    breatheSpeed: 0.8, breatheAmp: 0.06,
    glowColor: '#6bffe8', glowBlur: 20,
    bodyGrad: ['rgba(168, 255, 240, 0.85)', 'rgba(107, 255, 232, 0.6)', 'rgba(77, 232, 214, 0.2)'],
    tentacleCount: 5,
    tentacleSpacing: 14,
    tentacleLenMin: 90, tentacleLenMax: 130,
    tentacleWaveFreqMin: 0.8, tentacleWaveFreqMax: 1.4,
    tentacleWaveAmpMin: 6, tentacleWaveAmpMax: 10,
  },

  // 深海荧光微粒
  particles: {
    visible: true,
    count: 30,
    vxMin: -0.075, vxMax: 0.075,
    vyMin: -0.1, vyMax: 0.0,
    rMin: 0.8, rMax: 2.6,
    alphaMin: 0.2, alphaMax: 0.7,
    blinkFreqMin: 0.3, blinkFreqMax: 1.8,
    colors: ['#4de8d6', '#6bffe8', '#a8fff0'],
  },

  // 热液喷发粒子
  magma: {
    visible: true,
    countPerVent: 25,
    vxMin: -0.2, vxMax: 0.2,
    vyMin: -1.1, vyMax: -0.3,
    rMin: 2, rMax: 6,
    maxRMin: 4, maxRMax: 10,
    decayMin: 0.003, decayMax: 0.007,
    ventIntensity: [1.0, 0.7],
  },

  // 河流微光
  glints: {
    visible: true,
    count: 40,
    rMin: 1.5, rMax: 4,
    alphaMin: 0.3, alphaMax: 0.7,
    freqMin: 0.5, freqMax: 1.5,
  },

  // 远景山脉
  mountains: {
    visible: true,
    farBaseY: 0.5, farRoughness: 80, farOpacity: 0.6,
    midBaseY: 0.58, midRoughness: 60, midOpacity: 0.8,
    steps: 20,
    swaySpeed: 0.15, swayAmp: 2,
    // 固定轮廓点 (相对坐标 0-1)，为空时自动根据参数生成
    farPoints: [
      [0,0.507],[0.05,0.463],[0.1,0.481],[0.15,0.444],[0.2,0.472],

function closeCtxMenu() {
  if (_ctxMenuEl) { _ctxMenuEl.remove(); _ctxMenuEl = null; }
}

function showCtxMenu(x, y, items) {
  closeCtxMenu();
  const menu = document.createElement('div');
  menu.className = 'layer-ctx-menu';
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
  items.forEach(item => {
    if (item === '---') {
      const d = document.createElement('div'); d.className = 'layer-ctx-divider';
      menu.appendChild(d); return;
    }
    const el = document.createElement('div');
    el.className = 'layer-ctx-item' + (item.danger ? ' danger' : '');
    el.textContent = item.label;
    el.onclick = () => { closeCtxMenu(); item.action(); };
    menu.appendChild(el);
  });
  document.body.appendChild(menu);
  _ctxMenuEl = menu;
  // 确保不超出视口
  const r = menu.getBoundingClientRect();
  if (r.right > window.innerWidth) menu.style.left = (x - r.width) + 'px';
  if (r.bottom > window.innerHeight) menu.style.top = (y - r.height) + 'px';
  setTimeout(() => document.addEventListener('click', closeCtxMenu, { once: true }), 0);
}

function getLayerMeta(id) {
  if (id.startsWith('shape_')) {
    const sid = parseInt(id.split('_')[1]);
    const s = (config.shapes || []).find(sh => sh.id === sid);
    return { icon: s ? (s.type === 'polygon' ? '⬟' : s.type === 'polyline' ? '⌇' : '∿') : '?', name: s ? (s.name || '未命名形状') : '未知' };
  }
  if (id.startsWith('group_')) {
    const g = (config.groups || []).find(gr => gr.id === id);
    return { icon: '📁', name: g ? (g.name || '编组') : '未知' };
  }
  return ELEMENT_META[id] || { icon: '?', name: id };
}

function isLayerVisible(id) {
  if (id.startsWith('shape_')) {
    const sid = parseInt(id.split('_')[1]);
    const s = (config.shapes || []).find(sh => sh.id === sid);
    return s && s.visible !== false;
  }
  if (id.startsWith('group_')) return true;
  return getNestedValue(config, id + '.visible') !== false;
}

function toggleLayerVisibility(id) {
  if (id.startsWith('shape_')) {
    const sid = parseInt(id.split('_')[1]);
    const s = (config.shapes || []).find(sh => sh.id === sid);
    if (s) s.visible = s.visible === false ? true : false;
  } else if (!id.startsWith('group_')) {
    const cur = getNestedValue(config, id + '.visible');
    setNestedValue(config, id + '.visible', cur === false ? true : false);
  }
  rebuild();
}

function moveLayerInOrder(id, direction) {
  const order = config.layerOrder;
  const idx = order.indexOf(id);
  if (idx < 0) return;
  const targetIdx = idx + direction;
  if (targetIdx < 0 || targetIdx >= order.length) return;
  [order[idx], order[targetIdx]] = [order[targetIdx], order[idx]];
  rebuild();
}

function moveLayerToPosition(id, targetId, pos) {
  const order = config.layerOrder;
  const fromIdx = order.indexOf(id);
  if (fromIdx < 0) return;
  order.splice(fromIdx, 1);
  let toIdx = order.indexOf(targetId);
  if (toIdx < 0) { order.push(id); }
  else {
    if (pos === 'bottom') toIdx++;
    order.splice(toIdx, 0, id);
  }
  rebuild();
}

function getSelectedLayerIds() {
  return Array.from(_layerSelectedIds);
}

function groupSelectedLayers() {
  const ids = getSelectedLayerIds().filter(id => !id.startsWith('group_'));
  if (ids.length < 2) return;
  const gid = 'group_' + Date.now();
  const group = { id: gid, name: '编组 ' + ((config.groups || []).length + 1), children: ids, collapsed: false };
  if (!config.groups) config.groups = [];
  config.groups.push(group);
  // 在 layerOrder 中，用 group 替换第一个元素的位置，移除其他元素
  const order = config.layerOrder;
  // 收集索引并从高到低排序，避免 splice 时索引偏移
  const indices = ids.map(id => order.indexOf(id)).filter(i => i >= 0).sort((a, b) => b - a);
  const firstIdx = indices[indices.length - 1];
  indices.forEach(i => order.splice(i, 1));
  order.splice(firstIdx, 0, gid);
  _layerSelectedIds = new Set([gid]);
  rebuild();
}

function ungroupLayer(gid) {
  const group = (config.groups || []).find(g => g.id === gid);
  if (!group) return;
  const order = config.layerOrder;
  const idx = order.indexOf(gid);
  if (idx >= 0) {
    order.splice(idx, 1, ...group.children);
  }
  config.groups = config.groups.filter(g => g.id !== gid);
  _layerSelectedIds = new Set(group.children);
  rebuild();
}

function deleteLayer(id) {
  if (id.startsWith('shape_')) {
    const sid = parseInt(id.split('_')[1]);
    deleteShape(sid);
  } else if (id.startsWith('group_')) {
    ungroupLayer(id);
  }
}

    displayList.push({ id, depth: 0 });

      const group = groups.find(g => g.id === id);

          displayList.push({ id: group.children[j], depth: 1, groupId: id });

    const vis = isLayerVisible(id);

      drag.className = 'layer-drag';
      drag.textContent = '⠿';
      drag.draggable = true;
      drag.ondragstart = (e) => { _layerDragId = id; e.dataTransfer.effectAllowed = 'move'; };
      row.appendChild(drag);

      // 折叠箭头
      const toggle = document.createElement('span');
      toggle.className = 'layer-group-toggle' + (group.collapsed ? ' collapsed' : '');
      toggle.textContent = '▼';
      toggle.onclick = (e) => {
        e.stopPropagation();
        group.collapsed = !group.collapsed;
        buildUI();
      };
      row.appendChild(toggle);

      const icon = document.createElement('span');
      icon.className = 'layer-group-icon';
      icon.textContent = meta.icon;
      row.appendChild(icon);

      const name = document.createElement('span');
      name.className = 'layer-group-name';
      name.textContent = meta.name;
      row.appendChild(name);

      count.className = 'layer-group-count';

          { label: '置顶', action: () => { const o = config.layerOrder; const i = o.indexOf(id); if (i >= 0) { o.splice(i, 1); o.push(id); } rebuild(); } },
          { label: '置底', action: () => { const o = config.layerOrder; const i = o.indexOf(id); if (i >= 0) { o.splice(i, 1); o.unshift(id); } rebuild(); } },

  row.appendChild(drag);

  // 图标
  const icon = document.createElement('span');
  icon.className = 'layer-icon';
  icon.textContent = meta.icon;
  row.appendChild(icon);

  // 名称
  const name = document.createElement('span');
  name.className = 'layer-name';
  name.textContent = meta.name;
  row.appendChild(name);

  // 可见性
  const eye = document.createElement('span');
  eye.className = 'layer-eye';
  eye.textContent = vis ? '👁' : '◌';
  eye.title = vis ? '隐藏' : '显示';
  eye.onclick = (e) => { e.stopPropagation(); toggleLayerVisibility(id); };
  row.appendChild(eye);

  // 点击选中
  row.onclick = (e) => {
    if (e.target === eye) return;
    if (e.ctrlKey || e.metaKey) {
      if (_layerSelectedIds.has(id)) _layerSelectedIds.delete(id);
      else _layerSelectedIds.add(id);
    } else {
      _layerSelectedIds = new Set([id]);
    }
    window.selectedElement = id;
    openPropertyEditor(id);
    buildUI();
  };

  // 右键菜单
  row.oncontextmenu = (e) => {
    e.preventDefault();
    if (!_layerSelectedIds.has(id)) _layerSelectedIds = new Set([id]);
    const items = [
      { label: '⬆ 上移一层', action: () => moveLayerInOrder(id, 1) },
      { label: '⬇ 下移一层', action: () => moveLayerInOrder(id, -1) },
      '---',
      { label: '置顶', action: () => { const o = config.layerOrder; const i = o.indexOf(id); if (i >= 0) { o.splice(i, 1); o.push(id); } rebuild(); } },
      { label: '置底', action: () => { const o = config.layerOrder; const i = o.indexOf(id); if (i >= 0) { o.splice(i, 1); o.unshift(id); } rebuild(); } },
    ];
    if (groupId) {
      items.push('---');
      items.push({ label: '📂 从编组移出', action: () => {
        const group = (config.groups || []).find(g => g.id === groupId);
        if (group) {
          group.children = group.children.filter(cid => cid !== id);
          if (group.children.length < 2) ungroupLayer(groupId);
          rebuild();
        }
      }});
    }
    if (_layerSelectedIds.size >= 2) {
      items.push('---');
      items.push({ label: '📁 编组选中项', action: () => groupSelectedLayers() });
    }
    if (id.startsWith('shape_')) {
      items.push('---');
      items.push({ label: '🗑 删除', danger: true, action: () => deleteLayer(id) });
    }
    showCtxMenu(e.clientX, e.clientY, items);
  };

  // 拖放
  row.ondragover = (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const rect = row.getBoundingClientRect();
    const midY = rect.top + rect.height / 2;
    if (e.clientY < midY) {
      row.classList.add('drag-over-top');
      row.classList.remove('drag-over-bottom');
    } else {
      row.classList.add('drag-over-bottom');
      row.classList.remove('drag-over-top');
    }
  };
  row.ondragleave = () => {
    row.classList.remove('drag-over-top', 'drag-over-bottom');
  };
  row.ondrop = (e) => {
    e.preventDefault();
    row.classList.remove('drag-over-top', 'drag-over-bottom');
    if (_layerDragId && _layerDragId !== id) {
      const rect = row.getBoundingClientRect();
      const pos = e.clientY < rect.top + rect.height / 2 ? 'top' : 'bottom';
      moveLayerToPosition(_layerDragId, id, pos);
    }
    _layerDragId = null;
  };

  return row;
}

// 嵌套取值辅助
function getNestedValue(obj, path) {
  const keys = path.split('.');
  let cur = obj;
  for (const k of keys) {
    if (cur == null) return undefined;
    cur = cur[k];
  }
  return cur;
}
function setNestedValue(obj, path, val) {
  const keys = path.split('.');
  let cur = obj;
  for (let i = 0; i < keys.length - 1; i++) {
    if (cur[keys[i]] == null) cur[keys[i]] = {};
    cur = cur[keys[i]];
  }
  cur[keys[keys.length - 1]] = val;
}

// ===================== 渐变色辅助 =====================
function isGradient(v) { return v && typeof v === 'object' && v.mode && v.stops; }

function defaultGradient() {
  return { mode: 'linear', angle: 0, cx: 0.5, cy: 0.5, r: 0.5, stops: [{ pos: 0, color: '#000000' }, { pos: 1, color: '#ffffff' }] };
}

function gradientToCSS(v) {
  if (!v || !v.stops || v.stops.length < 2) return '#000';
  const stops = v.stops.map(s => `${s.color} ${(s.pos * 100).toFixed(1)}%`).join(', ');
  if (v.mode === 'linear') return `linear-gradient(${v.angle || 0}deg, ${stops})`;
  return `radial-gradient(circle, ${stops})`;
}

function colorToHex(c) {
  if (!c) return '#000000';
  if (c.startsWith('#')) return c.slice(0, 7);
  const m = c.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
  if (m) return '#' + [m[1], m[2], m[3]].map(x => parseInt(x).toString(16).padStart(2, '0')).join('');
  return '#000000';
}

function hexAlphaToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

function rgbaAlpha(c) {
  if (!c) return 1;
  const m = c.match(/rgba?\([^)]*,\s*([\d.]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}

/**
 * 将颜色值（字符串或渐变对象）解析为 canvas fillStyle
 * @param {CanvasRenderingContext2D} ctx
 * @param {*} value - 字符串颜色 或 渐变对象 {mode, angle/cx/cy/r, stops}
 * @param {number} w - 画布宽
 * @param {number} h - 画布高
 * @param {object} [bounds] - {x0,y0,x1,y1} 元素包围盒，用于线性渐变定位
 */
function resolveColor(ctx, value, w, h, bounds) {
  if (typeof value === 'string') return value;
  if (!isGradient(value) || value.stops.length < 2) return '#000';
  if (value.mode === 'linear') {
    const angle = (value.angle || 0) * Math.PI / 180;
    let cx, cy, len;
    if (bounds) {
      cx = (bounds.x0 + bounds.x1) / 2; cy = (bounds.y0 + bounds.y1) / 2;
      len = Math.hypot(bounds.x1 - bounds.x0, bounds.y1 - bounds.y0) / 2;
    } else { cx = w / 2; cy = h / 2; len = Math.max(w, h) / 2; }
    const grad = ctx.createLinearGradient(
      cx - Math.cos(angle) * len, cy - Math.sin(angle) * len,
      cx + Math.cos(angle) * len, cy + Math.sin(angle) * len
    );
    value.stops.forEach(s => grad.addColorStop(Math.max(0, Math.min(1, s.pos)), s.color));
    return grad;
  }
  if (value.mode === 'radial') {
    const cx = w * (value.cx != null ? value.cx : 0.5);
    const cy = h * (value.cy != null ? value.cy : 0.5);
    const r = Math.max(w, h) * (value.r != null ? value.r : 0.5);
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    value.stops.forEach(s => grad.addColorStop(Math.max(0, Math.min(1, s.pos)), s.color));
    return grad;
  }
  return '#000';
}

/** 提取渐变对象的主色（第一个 stop），用于 shadowColor 等只接受纯色的场景 */
function primaryColor(value) {
  if (typeof value === 'string') return value;
  if (isGradient(value) && value.stops.length > 0) return value.stops[0].color;
  return '#000';
}

/**
 * 创建渐变色选择器 UI
 * @param {*} currentValue - 当前值（字符串或渐变对象）
 * @param {boolean} withAlpha - 是否支持透明度
 * @param {function} onChange - 值变更回调
 */
function createGradientPicker(currentValue, withAlpha, onChange) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'flex:1;';

  // 解析当前值
  let mode = 'solid';
  let solidHex = '#000000', solidAlpha = 1;
  let grad = defaultGradient();

  if (isGradient(currentValue)) {
    mode = currentValue.mode;
    grad = JSON.parse(JSON.stringify(currentValue));
    if (!grad.stops || grad.stops.length < 2) grad.stops = [{ pos: 0, color: '#000' }, { pos: 1, color: '#fff' }];
  } else {
    solidHex = colorToHex(currentValue);
    solidAlpha = rgbaAlpha(currentValue);
  }

  // ---- 模式切换栏 ----
  const modeBar = document.createElement('div');
  modeBar.className = 'grad-mode-bar';
  const modes = [['solid', '纯色'], ['linear', '线性渐变'], ['radial', '径向渐变']];
  const modeBtns = modes.map(([m, lbl]) => {
    const btn = document.createElement('button');
    btn.className = 'grad-mode-btn' + (mode === m ? ' active' : '');
    btn.textContent = lbl;
    btn.onclick = () => { mode = m; refreshUI(); emit(); };
    modeBar.appendChild(btn);
    return btn;
  });
  wrap.appendChild(modeBar);

  // ---- 纯色面板 ----
  const solidPanel = document.createElement('div');
  solidPanel.className = 'field-row';
  const solidCp = document.createElement('input'); solidCp.type = 'color'; solidCp.value = solidHex;
  solidCp.oninput = () => { solidHex = solidCp.value; emit(); };
  solidPanel.appendChild(solidCp);
  if (withAlpha) {
    const solidAp = document.createElement('input'); solidAp.type = 'range'; solidAp.min = 0; solidAp.max = 1; solidAp.step = 0.01; solidAp.value = solidAlpha; solidAp.style.flex = '1';
    const solidAv = document.createElement('span'); solidAv.className = 'val'; solidAv.textContent = solidAlpha.toFixed(2);
    solidAp.oninput = () => { solidAlpha = parseFloat(solidAp.value); solidAv.textContent = solidAlpha.toFixed(2); emit(); };
    solidPanel.appendChild(solidAp); solidPanel.appendChild(solidAv);
  }
  wrap.appendChild(solidPanel);

  // ---- 渐变面板 ----
  const gradPanel = document.createElement('div');
  gradPanel.style.display = 'none';

  // 预览条
  const previewBar = document.createElement('div');
  previewBar.className = 'grad-preview-bar';
  gradPanel.appendChild(previewBar);

  // 角度 / 半径
  const ctrlRow = document.createElement('div'); ctrlRow.className = 'field-row'; ctrlRow.style.marginBottom = '6px';
  const ctrlLabel = document.createElement('label'); ctrlLabel.style.minWidth = '40px';
  const ctrlInput = document.createElement('input'); ctrlInput.type = 'range'; ctrlInput.style.flex = '1';
  const ctrlVal = document.createElement('span'); ctrlVal.className = 'val';
  ctrlInput.oninput = () => {
    if (mode === 'linear') grad.angle = parseFloat(ctrlInput.value);
    else grad.r = parseFloat(ctrlInput.value) / 100;
    ctrlVal.textContent = ctrlInput.value;
    updatePreview(); emit();
  };
  ctrlRow.appendChild(ctrlLabel); ctrlRow.appendChild(ctrlInput); ctrlRow.appendChild(ctrlVal);
  gradPanel.appendChild(ctrlRow);

  // 色标列表
  const stopsDiv = document.createElement('div');
  gradPanel.appendChild(stopsDiv);

  // 添加色标按钮
  const addBtn = document.createElement('button');
  addBtn.className = 'grad-add-btn'; addBtn.textContent = '+ 添加色标';
  addBtn.onclick = () => {
    grad.stops.push({ pos: 0.5, color: '#ffffff' });
    grad.stops.sort((a, b) => a.pos - b.pos);
    renderStops(); updatePreview(); emit();
  };
  gradPanel.appendChild(addBtn);
  wrap.appendChild(gradPanel);

  function renderStops() {
    stopsDiv.innerHTML = '';
    grad.stops.forEach((s, i) => {
      const row = document.createElement('div'); row.className = 'grad-stop-row';
      const cp = document.createElement('input'); cp.type = 'color'; cp.value = colorToHex(s.color);
      cp.oninput = () => { s.color = cp.value; updatePreview(); emit(); };
      const pos = document.createElement('input'); pos.type = 'range'; pos.min = 0; pos.max = 1; pos.step = 0.01; pos.value = s.pos;
      const pv = document.createElement('span'); pv.className = 'val'; pv.textContent = s.pos.toFixed(2);
      pos.oninput = () => { s.pos = parseFloat(pos.value); pv.textContent = s.pos.toFixed(2); updatePreview(); emit(); };
      row.appendChild(cp); row.appendChild(pos); row.appendChild(pv);
      if (grad.stops.length > 2) {
        const del = document.createElement('span'); del.className = 'grad-stop-del'; del.textContent = '✕';
        del.onclick = () => { grad.stops.splice(i, 1); renderStops(); updatePreview(); emit(); };
        row.appendChild(del);
      }
      stopsDiv.appendChild(row);
    });
  }

  function updatePreview() {
    previewBar.style.background = gradientToCSS(grad);
  }

  function refreshUI() {
    modeBtns.forEach((btn, i) => btn.classList.toggle('active', modes[i][0] === mode));
    solidPanel.style.display = mode === 'solid' ? 'flex' : 'none';
    gradPanel.style.display = mode !== 'solid' ? 'block' : 'none';
    if (mode !== 'solid') {
      ctrlLabel.textContent = mode === 'linear' ? '角度' : '半径';
      ctrlInput.max = mode === 'linear' ? 360 : 100;
      ctrlInput.value = mode === 'linear' ? (grad.angle || 0) : ((grad.r || 0.5) * 100);
      ctrlVal.textContent = ctrlInput.value;
      renderStops(); updatePreview();
    }
  }

  function emit() {
    if (mode === 'solid') {
      onChange(withAlpha ? hexAlphaToRgba(solidHex, solidAlpha) : solidHex);
    } else {
      const out = { mode, stops: grad.stops.map(s => ({ pos: s.pos, color: s.color })) };
      if (mode === 'linear') out.angle = grad.angle || 0;
      else { out.cx = grad.cx || 0.5; out.cy = grad.cy || 0.5; out.r = grad.r || 0.5; }
      onChange(out);
    }
  }

  refreshUI();
  return wrap;
}

let _shapeIdCounter = 0;
function addShape(stype) {
  if (!config.shapes) config.shapes = [];
  const id = 's' + (++_shapeIdCounter) + '_' + Date.now().toString(36);
  const defaults = {
