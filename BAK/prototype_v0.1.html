<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnakeWorm v0.1 - 基础移动与生长</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            color: #eee;
        }
        h1 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #4ecca3;
        }
        #gameCanvas {
            border: 2px solid #4ecca3;
            background: #2d2d3a;
            cursor: crosshair;
        }
        #ui {
            margin-top: 10px;
            display: flex;
            gap: 30px;
            font-size: 16px;
        }
        #ui span {
            color: #4ecca3;
        }
        #ui .value {
            color: #fff;
            font-weight: bold;
        }
        #controls {
            margin-top: 10px;
            font-size: 12px;
            color: #888;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.85);
            padding: 30px 50px;
            border-radius: 10px;
            border: 2px solid #4ecca3;
            text-align: center;
            display: none;
        }
        #gameOver h2 {
            color: #ff6b6b;
            margin-bottom: 15px;
        }
        #gameOver button {
            margin-top: 15px;
            padding: 10px 30px;
            font-size: 16px;
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        #gameOver button:hover {
            background: #3db892;
        }
    </style>
</head>
<body>
    <h1>🐍 SnakeWorm v0.1 - 基础移动与生长</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="ui">
        <div>长度: <span class="value" id="lengthDisplay">3</span></div>
        <div>分数: <span class="value" id="scoreDisplay">0</span></div>
        <div>速度: <span class="value" id="speedDisplay">5</span></div>
    </div>
    <div id="controls">
        操控方式: 鼠标移动控制方向 | 目标: 吃掉绿色食物块，增长身体，不要撞墙！
    </div>
    <div id="gameOver">
        <h2>游戏结束！</h2>
        <p>最终长度: <span id="finalLength">0</span></p>
        <p>最终分数: <span id="finalScore">0</span></p>
        <button onclick="game.restart()">重新开始</button>
    </div>

    <script>
        /**
         * SnakeWorm v0.1 - 基础移动与生长原型
         * 
         * 核心机制:
         * - 蚯蚓由头部+多段身体组成，头部跟随鼠标移动
         * - 身体段平滑跟随头部，形成蛇形运动
         * - 吃食物后尾部增长
         * - 撞墙游戏结束
         */

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 游戏配置
        const CONFIG = {
            CANVAS_WIDTH: 800,
            CANVAS_HEIGHT: 600,
            SEGMENT_RADIUS: 8,          // 身体段半径
            SEGMENT_SPACING: 14,        // 段间距（决定身体紧凑度）
            BASE_SPEED: 5,              // 基础移动速度
            MIN_SPEED: 2,               // 最低速度（随长度增加而降低）
            SPEED_DECAY: 0.02,          // 速度衰减系数（每段降低多少）
            FOOD_RADIUS: 6,             // 食物半径
            FOOD_COUNT: 5,              // 同时存在的食物数量
            WORM_INITIAL_LENGTH: 3,     // 初始长度（段数）
            GROWTH_PER_FOOD: 2,         // 每个食物增长多少段
            WALL_MARGIN: 10             // 墙壁边距
        };

        /**
         * 向量工具类
         */
        class Vector {
            constructor(x, y) {
                this.x = x;
                this.y = y;
            }
            
            add(v) { return new Vector(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vector(this.x - v.x, this.y - v.y); }
            mult(n) { return new Vector(this.x * n, this.y * n); }
            
            mag() {
                return Math.sqrt(this.x * this.x + this.y * this.y);
            }
            
            normalize() {
                const m = this.mag();
                if (m === 0) return new Vector(0, 0);
                return new Vector(this.x / m, this.y / m);
            }
            
            dist(v) {
                const dx = this.x - v.x;
                const dy = this.y - v.y;
                return Math.sqrt(dx * dx + dy * dy);
            }
        }

        /**
         * 食物类
         */
        class Food {
            constructor(x, y) {
                this.pos = new Vector(x, y);
                this.radius = CONFIG.FOOD_RADIUS;
                this.pulsePhase = Math.random() * Math.PI * 2; // 脉冲动画相位
            }
            
            /**
             * 在画布范围内随机生成新位置
             */
            static random() {
                const margin = CONFIG.WALL_MARGIN + CONFIG.FOOD_RADIUS;
                const x = margin + Math.random() * (CONFIG.CANVAS_WIDTH - margin * 2);
                const y = margin + Math.random() * (CONFIG.CANVAS_HEIGHT - margin * 2);
                return new Food(x, y);
            }
            
            update(deltaTime) {
                this.pulsePhase += deltaTime * 3;
            }
            
            draw(ctx) {
                // 脉冲效果
                const pulse = Math.sin(this.pulsePhase) * 2;
                const r = this.radius + pulse;
                
                // 发光效果
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#4ecca3';
                
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, r, 0, Math.PI * 2);
                ctx.fillStyle = '#4ecca3';
                ctx.fill();
                
                ctx.shadowBlur = 0;
                
                // 内部高光
                ctx.beginPath();
                ctx.arc(this.pos.x - 2, this.pos.y - 2, r * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.fill();
            }
        }

        /**
         * 蚯蚓类
         */
        class Worm {
            constructor(x, y, length, color = '#4ecca3') {
                this.segments = [];  // 身体段数组，每个元素是 Vector
                this.color = color;
                this.targetLength = length;  // 目标长度（段数）
                
                // 初始化身体段（头部在索引0）
                for (let i = 0; i < length; i++) {
                    this.segments.push(new Vector(x - i * CONFIG.SEGMENT_SPACING, y));
                }
                
                this.velocity = new Vector(1, 0);  // 当前移动方向
                this.speed = CONFIG.BASE_SPEED;     // 当前速度
            }
            
            /**
             * 获取头部位置
             */
            get head() {
                return this.segments[0];
            }
            
            /**
             * 获取当前实际长度（段数）
             */
            get length() {
                return this.segments.length;
            }
            
            /**
             * 根据长度计算当前速度（越长越慢）
             */
            updateSpeed() {
                const speedReduction = (this.length - CONFIG.WORM_INITIAL_LENGTH) * CONFIG.SPEED_DECAY;
                this.speed = Math.max(CONFIG.MIN_SPEED, CONFIG.BASE_SPEED - speedReduction);
            }
            
            /**
             * 增长身体（在尾部添加新段）
             */
            grow(amount) {
                this.targetLength += amount;
            }
            
            /**
             * 更新蚯蚓位置和形态
             * @param {Vector} targetPos - 鼠标/目标位置
             * @param {number} deltaTime - 时间增量
             */
            update(targetPos, deltaTime) {
                // 1. 更新速度（根据长度）
                this.updateSpeed();
                
                // 2. 头部向目标位置移动
                const head = this.segments[0];
                const direction = targetPos.sub(head).normalize();
                
                // 如果目标位置与头部重合，保持原方向
                if (direction.mag() === 0) {
                    // 保持当前方向继续移动
                } else {
                    this.velocity = direction;
                }
                
                // 移动头部
                const moveStep = this.velocity.mult(this.speed * deltaTime * 60); // 标准化到60fps
                this.segments[0] = head.add(moveStep);
                
                // 3. 身体段跟随（每个段向前一个段移动，保持固定距离）
                for (let i = 1; i < this.segments.length; i++) {
                    const prev = this.segments[i - 1];
                    const curr = this.segments[i];
                    
                    const dir = prev.sub(curr);
                    const dist = dir.mag();
                    
                    // 如果距离大于段间距，移动到保持段间距的位置
                    if (dist > CONFIG.SEGMENT_SPACING) {
                        const targetPos = prev.sub(dir.normalize().mult(CONFIG.SEGMENT_SPACING));
                        // 平滑移动（lerp）
                        const lerpFactor = 0.3; // 跟随平滑度
                        this.segments[i] = new Vector(
                            curr.x + (targetPos.x - curr.x) * lerpFactor,
                            curr.y + (targetPos.y - curr.y) * lerpFactor
                        );
                    }
                }
                
                // 4. 如果实际长度小于目标长度，在尾部添加新段
                while (this.segments.length < this.targetLength) {
                    const tail = this.segments[this.segments.length - 1];
                    this.segments.push(new Vector(tail.x, tail.y));
                }
            }
            
            /**
             * 检测头部是否撞墙
             */
            checkWallCollision() {
                const head = this.segments[0];
                const margin = CONFIG.WALL_MARGIN + CONFIG.SEGMENT_RADIUS;
                
                return head.x < margin || 
                       head.x > CONFIG.CANVAS_WIDTH - margin ||
                       head.y < margin || 
                       head.y > CONFIG.CANVAS_HEIGHT - margin;
            }
            
            /**
             * 检测头部是否与食物碰撞
             * @returns {number} 碰撞的食物索引，-1表示无碰撞
             */
            checkFoodCollision(foods) {
                const head = this.segments[0];
                const eatDistance = CONFIG.SEGMENT_RADIUS + CONFIG.FOOD_RADIUS;
                
                for (let i = 0; i < foods.length; i++) {
                    if (head.dist(foods[i].pos) < eatDistance) {
                        return i;
                    }
                }
                return -1;
            }
            
            /**
             * 绘制蚯蚓
             */
            draw(ctx) {
                // 绘制身体段（从尾部到头部，这样头部在最上层）
                for (let i = this.segments.length - 1; i >= 0; i--) {
                    const seg = this.segments[i];
                    const isHead = i === 0;
                    
                    // 头部稍大，身体逐渐变小
                    const sizeRatio = isHead ? 1.0 : (0.7 + 0.3 * (1 - i / this.segments.length));
                    const radius = CONFIG.SEGMENT_RADIUS * sizeRatio;
                    
                    ctx.beginPath();
                    ctx.arc(seg.x, seg.y, radius, 0, Math.PI * 2);
                    
                    // 头部用亮色，身体用渐变色
                    if (isHead) {
                        ctx.fillStyle = this.color;
                        ctx.shadowBlur = 8;
                        ctx.shadowColor = this.color;
                    } else {
                        // 身体颜色逐渐变淡
                        const alpha = 0.4 + 0.6 * (1 - i / this.segments.length);
                        ctx.fillStyle = this.hexToRgba(this.color, alpha);
                        ctx.shadowBlur = 0;
                    }
                    
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    
                    // 头部绘制眼睛
                    if (isHead) {
                        this.drawEyes(ctx, seg);
                    }
                }
            }
            
            /**
             * 绘制头部眼睛
             */
            drawEyes(ctx, headPos) {
                const eyeOffset = 3;
                const eyeRadius = 2.5;
                
                // 根据移动方向计算眼睛位置
                const angle = Math.atan2(this.velocity.y, this.velocity.x);
                const eyeAngle1 = angle - 0.5;
                const eyeAngle2 = angle + 0.5;
                
                const eye1 = new Vector(
                    headPos.x + Math.cos(eyeAngle1) * eyeOffset,
                    headPos.y + Math.sin(eyeAngle1) * eyeOffset
                );
                const eye2 = new Vector(
                    headPos.x + Math.cos(eyeAngle2) * eyeOffset,
                    headPos.y + Math.sin(eyeAngle2) * eyeOffset
                );
                
                // 眼白
                ctx.fillStyle = '#fff';
                ctx.beginPath(); ctx.arc(eye1.x, eye1.y, eyeRadius, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eye2.x, eye2.y, eyeRadius, 0, Math.PI * 2); ctx.fill();
                
                // 瞳孔
                ctx.fillStyle = '#000';
                ctx.beginPath(); ctx.arc(eye1.x, eye1.y, 1, 0, Math.PI * 2); ctx.fill();
                ctx.beginPath(); ctx.arc(eye2.x, eye2.y, 1, 0, Math.PI * 2); ctx.fill();
            }
            
            /**
             * 辅助：hex颜色转rgba
             */
            hexToRgba(hex, alpha) {
                const r = parseInt(hex.slice(1, 3), 16);
                const g = parseInt(hex.slice(3, 5), 16);
                const b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            }
        }

        /**
         * 游戏主类
         */
        class Game {
            constructor() {
                this.worm = null;
                this.foods = [];
                this.mousePos = new Vector(CONFIG.CANVAS_WIDTH / 2, CONFIG.CANVAS_HEIGHT / 2);
                this.score = 0;
                this.isRunning = false;
                this.isGameOver = false;
                this.lastTime = 0;
                
                this.setupInput();
                this.restart();
                this.loop(0);
            }
            
            /**
             * 设置输入监听
             */
            setupInput() {
                // 鼠标移动
                canvas.addEventListener('mousemove', (e) => {
                    const rect = canvas.getBoundingClientRect();
                    this.mousePos = new Vector(
                        e.clientX - rect.left,
                        e.clientY - rect.top
                    );
                });
                
                // 触摸支持（移动端）
                canvas.addEventListener('touchmove', (e) => {
                    e.preventDefault();
                    const rect = canvas.getBoundingClientRect();
                    const touch = e.touches[0];
                    this.mousePos = new Vector(
                        touch.clientX - rect.left,
                        touch.clientY - rect.top
                    );
                });
            }
            
            /**
             * 重新开始游戏
             */
            restart() {
                this.worm = new Worm(
                    CONFIG.CANVAS_WIDTH / 2,
                    CONFIG.CANVAS_HEIGHT / 2,
                    CONFIG.WORM_INITIAL_LENGTH
                );
                this.foods = [];
                this.score = 0;
                this.isRunning = true;
                this.isGameOver = false;
                
                // 生成初始食物
                for (let i = 0; i < CONFIG.FOOD_COUNT; i++) {
                    this.foods.push(Food.random());
                }
                
                // 隐藏游戏结束画面
                document.getElementById('gameOver').style.display = 'none';
                this.updateUI();
            }
            
            /**
             * 更新UI显示
             */
            updateUI() {
                document.getElementById('lengthDisplay').textContent = this.worm.length;
                document.getElementById('scoreDisplay').textContent = this.score;
                document.getElementById('speedDisplay').textContent = this.worm.speed.toFixed(1);
            }
            
            /**
             * 游戏主循环
             */
            loop(timestamp) {
                // 计算时间增量（秒）
                const deltaTime = this.lastTime ? (timestamp - this.lastTime) / 1000 : 1/60;
                this.lastTime = timestamp;
                
                if (this.isRunning && !this.isGameOver) {
                    this.update(deltaTime);
                }
                
                this.draw();
                requestAnimationFrame((t) => this.loop(t));
            }
            
            /**
             * 更新游戏逻辑
             */
            update(deltaTime) {
                // 限制deltaTime防止切换标签页后跳帧
                const dt = Math.min(deltaTime, 1/30);
                
                // 更新蚯蚓
                this.worm.update(this.mousePos, dt);
                
                // 检测撞墙
                if (this.worm.checkWallCollision()) {
                    this.gameOver();
                    return;
                }
                
                // 检测吃食物
                const eatenIndex = this.worm.checkFoodCollision(this.foods);
                if (eatenIndex !== -1) {
                    // 移除被吃的食物
                    this.foods.splice(eatenIndex, 1);
                    
                    // 蚯蚓增长
                    this.worm.grow(CONFIG.GROWTH_PER_FOOD);
                    
                    // 增加分数
                    this.score += 10;
                    
                    // 生成新食物
                    this.foods.push(Food.random());
                }
                
                // 更新食物动画
                this.foods.forEach(food => food.update(dt));
                
                // 更新UI
                this.updateUI();
            }
            
            /**
             * 绘制游戏画面
             */
            draw() {
                // 清空画布
                ctx.fillStyle = '#2d2d3a';
                ctx.fillRect(0, 0, CONFIG.CANVAS_WIDTH, CONFIG.CANVAS_HEIGHT);
                
                // 绘制网格背景（泥土质感）
                this.drawGrid();
                
                // 绘制食物
                this.foods.forEach(food => food.draw(ctx));
                
                // 绘制蚯蚓
                this.worm.draw(ctx);
                
                // 绘制墙壁边界
                this.drawWalls();
            }
            
            /**
             * 绘制网格背景
             */
            drawGrid() {
                ctx.strokeStyle = 'rgba(78, 204, 163, 0.05)';
                ctx.lineWidth = 1;
                const gridSize = 40;
                
                for (let x = 0; x < CONFIG.CANVAS_WIDTH; x += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(x, 0);
                    ctx.lineTo(x, CONFIG.CANVAS_HEIGHT);
                    ctx.stroke();
                }
                
                for (let y = 0; y < CONFIG.CANVAS_HEIGHT; y += gridSize) {
                    ctx.beginPath();
                    ctx.moveTo(0, y);
                    ctx.lineTo(CONFIG.CANVAS_WIDTH, y);
                    ctx.stroke();
                }
            }
            
            /**
             * 绘制墙壁边界
             */
            drawWalls() {
                ctx.strokeStyle = 'rgba(255, 107, 107, 0.3)';
                ctx.lineWidth = 2;
                const m = CONFIG.WALL_MARGIN;
                
                ctx.strokeRect(m, m, CONFIG.CANVAS_WIDTH - m * 2, CONFIG.CANVAS_HEIGHT - m * 2);
            }
            
            /**
             * 游戏结束
             */
            gameOver() {
                this.isGameOver = true;
                document.getElementById('finalLength').textContent = this.worm.length;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOver').style.display = 'block';
            }
        }

        // 启动游戏
        const game = new Game();
    </script>
</body>
</html>
